name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  GOTOOLCHAIN: auto

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            asset_glob: "build/bin/*.exe"
            asset_name: GrokProxyPlus-windows-amd64.exe
          - os: ubuntu-latest
            platform: linux/amd64
            asset_glob: "build/bin/*"
            asset_name: GrokProxyPlus-linux-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Ubuntu 24.04 ships webkit2gtk-4.1; Wails needs -tags webkit2_41
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            gcc \
            pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Go mod download
        run: go mod download

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            wails build -platform ${{ matrix.platform }} -tags webkit2_41 -clean
          else
            wails build -platform ${{ matrix.platform }} -clean
          fi

      - name: Prepare release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $exe = Get-ChildItem -Path build/bin -Filter *.exe -Recurse | Select-Object -First 1
          if (-not $exe) { throw "No .exe found under build/bin" }
          # Portable layout: exe + grok-signup-bot (auto-register needs Python on host)
          $bundle = "dist/GrokProxyPlus-windows-amd64"
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null
          Copy-Item $exe.FullName "$bundle/GrokProxyPlus.exe"
          Copy-Item -Recurse -Force grok-signup-bot "$bundle/grok-signup-bot"
          # Drop heavy/local junk if present
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "$bundle/grok-signup-bot/.venv","$bundle/grok-signup-bot/__pycache__"
          Get-ChildItem -Recurse "$bundle/grok-signup-bot" -Filter "__pycache__" -Directory -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          @"
          Grok Proxy Plus - Windows portable

          Layout:
            GrokProxyPlus.exe
            grok-signup-bot\   (Python auto-register bot)

          Auto-register setup (optional):
            1. Install Python 3 from https://www.python.org/ (check "Add to PATH")
            2. Install Chrome or Edge
            3. In this folder:
                 python -m pip install -r grok-signup-bot\requirements.txt
            4. Run GrokProxyPlus.exe - bot_dir resolves next to the exe

          Manual device login works without Python.
          Data: %LOCALAPPDATA%\GrokDesktop\
          "@ | Set-Content -Encoding utf8 "$bundle/README-WINDOWS.txt"
          Compress-Archive -Path $bundle -DestinationPath "dist/${{ matrix.asset_name }}.zip" -Force
          # Keep bare exe for users who only need SSO/device login
          Copy-Item $exe.FullName "dist/${{ matrix.asset_name }}"
          Get-ChildItem dist | Format-Table Name, Length

      - name: Prepare release asset (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          BIN=$(find build/bin -type f -executable ! -name "*.so" | head -n 1)
          if [ -z "$BIN" ]; then
            BIN=$(find build/bin -type f ! -name "*.json" ! -name "*.md" | head -n 1)
          fi
          if [ -z "$BIN" ]; then
            echo "No binary found:"; find build/bin -type f; exit 1
          fi
          BUNDLE="dist/GrokProxyPlus-linux-amd64-dir"
          mkdir -p "$BUNDLE"
          cp "$BIN" "$BUNDLE/GrokProxyPlus"
          chmod +x "$BUNDLE/GrokProxyPlus"
          cp -a grok-signup-bot "$BUNDLE/grok-signup-bot"
          rm -rf "$BUNDLE/grok-signup-bot/.venv" "$BUNDLE/grok-signup-bot/__pycache__" 2>/dev/null || true
          find "$BUNDLE/grok-signup-bot" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          cat > "$BUNDLE/README-LINUX.txt" <<'EOF'
          Grok Proxy Plus - Linux portable

          Layout:
            GrokProxyPlus
            grok-signup-bot/

          Auto-register (optional):
            python3 -m venv .venv
            .venv/bin/pip install -r grok-signup-bot/requirements.txt
            # Chrome/Chromium + optional xvfb for headless
          Manual device login works without Python.
          Data: ~/.local/share/GrokDesktop/
          EOF
          tar -C dist -czf "dist/${{ matrix.asset_name }}.tar.gz" "$(basename "$BUNDLE")"
          # Also ship bare binary
          cp "$BIN" "dist/${{ matrix.asset_name }}"
          chmod +x "dist/${{ matrix.asset_name }}"
          ls -la dist

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # GitHub API sometimes returns 503 Unicorn during release creation — retry.
    timeout-minutes: 30
    steps:
      # gh release needs a git repo context; artifacts alone are not enough.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: release-Windows
          path: release-assets

      - name: Download Linux asset
        uses: actions/download-artifact@v4
        with:
          name: release-Linux
          path: release-assets

      - name: List release assets
        run: ls -laR release-assets

      - name: Create GitHub Release (with retry)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-assets/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no release assets found"
            exit 1
          fi
          echo "assets: ${files[*]}"

          # Only ship real downloadable binaries/archives (skip unpacked dirs).
          upload=()
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              upload+=("$f")
            fi
          done
          if [ ${#upload[@]} -eq 0 ]; then
            echo "no release files found (only directories?)"
            ls -laR release-assets
            exit 1
          fi
          echo "upload: ${upload[*]}"

          # If a partial release already exists for this tag, delete it so we can recreate cleanly.
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "release $TAG already exists — deleting for clean republish"
            gh release delete "$TAG" --repo "$REPO" --yes || true
          fi

          notes="## Grok Proxy Plus ${TAG}

          Multi-rota estável: **Grok (xAI)** + **Kimi Work**, SQLite, proxy local OpenAI-compatible.

          ### Destaques
          - Grok: multi-conta OAuth, **\`/v1/responses\`**, pesquisa nativa xAI (\`/v1/search\`)
          - Kimi Work: login Google no navegador → \`sk-kimi\` → **\`/v1/chat/completions\`**
          - Persistência SQLite (\`grokdesktop.db\`) com migração automática do JSON antigo
          - Modelo da UI não força model no proxy HTTP

          ### Downloads
          - Windows: \`.exe\` ou \`.zip\` portátil
          - Linux: binário ou \`.tar.gz\`
          "

          attempt=1
          max=8
          while [ "$attempt" -le "$max" ]; do
            echo "=== release attempt $attempt/$max ==="
            if gh release create "$TAG" \
              --repo "$REPO" \
              --title "Grok Proxy Plus ${TAG}" \
              --notes "$notes" \
              --latest \
              --verify-tag \
              "${upload[@]}"; then
              echo "release published"
              exit 0
            fi
            echo "gh release create failed (attempt $attempt) — waiting..."
            sleep $((attempt * 15))
            attempt=$((attempt + 1))
          done
          echo "failed to create release after $max attempts"
          exit 1
