name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  GOTOOLCHAIN: auto

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            asset_glob: "build/bin/*.exe"
            asset_name: GrokProxyPlus-windows-amd64.exe
          - os: ubuntu-latest
            platform: linux/amd64
            asset_glob: "build/bin/*"
            asset_name: GrokProxyPlus-linux-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Ubuntu 24.04 ships webkit2gtk-4.1; Wails needs -tags webkit2_41
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            gcc \
            pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Go mod download
        run: go mod download

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            wails build -platform ${{ matrix.platform }} -tags webkit2_41 -clean
          else
            wails build -platform ${{ matrix.platform }} -clean
          fi

      - name: Prepare release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $exe = Get-ChildItem -Path build/bin -Filter *.exe -Recurse | Select-Object -First 1
          if (-not $exe) { throw "No .exe found under build/bin" }
          # Portable layout: exe + grok-signup-bot (auto-register needs Python on host)
          $bundle = "dist/GrokProxyPlus-windows-amd64"
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null
          Copy-Item $exe.FullName "$bundle/GrokProxyPlus.exe"
          Copy-Item -Recurse -Force grok-signup-bot "$bundle/grok-signup-bot"
          # Drop heavy/local junk if present
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "$bundle/grok-signup-bot/.venv","$bundle/grok-signup-bot/__pycache__"
          Get-ChildItem -Recurse "$bundle/grok-signup-bot" -Filter "__pycache__" -Directory -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          @"
          Grok Proxy Plus â€” Windows portable

          Layout:
            GrokProxyPlus.exe
            grok-signup-bot\   (Python auto-register bot)

          Auto-register setup (optional):
            1. Install Python 3 from https://www.python.org/ (check "Add to PATH")
            2. Install Chrome or Edge
            3. In this folder:
                 python -m pip install -r grok-signup-bot\requirements.txt
            4. Run GrokProxyPlus.exe â€” bot_dir resolves next to the exe

          Manual device login works without Python.
          Data: %LOCALAPPDATA%\GrokDesktop\
          "@ | Set-Content -Encoding utf8 "$bundle/README-WINDOWS.txt"
          Compress-Archive -Path $bundle -DestinationPath "dist/${{ matrix.asset_name }}.zip" -Force
          # Keep bare exe for users who only need SSO/device login
          Copy-Item $exe.FullName "dist/${{ matrix.asset_name }}"
          Get-ChildItem dist | Format-Table Name, Length

      - name: Prepare release asset (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          BIN=$(find build/bin -type f -executable ! -name "*.so" | head -n 1)
          if [ -z "$BIN" ]; then
            BIN=$(find build/bin -type f ! -name "*.json" ! -name "*.md" | head -n 1)
          fi
          if [ -z "$BIN" ]; then
            echo "No binary found:"; find build/bin -type f; exit 1
          fi
          BUNDLE="dist/GrokProxyPlus-linux-amd64-dir"
          mkdir -p "$BUNDLE"
          cp "$BIN" "$BUNDLE/GrokProxyPlus"
          chmod +x "$BUNDLE/GrokProxyPlus"
          cp -a grok-signup-bot "$BUNDLE/grok-signup-bot"
          rm -rf "$BUNDLE/grok-signup-bot/.venv" "$BUNDLE/grok-signup-bot/__pycache__" 2>/dev/null || true
          find "$BUNDLE/grok-signup-bot" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          cat > "$BUNDLE/README-LINUX.txt" <<'EOF'
          Grok Proxy Plus â€” Linux portable

          Layout:
            GrokProxyPlus
            grok-signup-bot/

          Auto-register (optional):
            python3 -m venv .venv
            .venv/bin/pip install -r grok-signup-bot/requirements.txt
            # Chrome/Chromium + optional xvfb for headless
          Manual device login works without Python.
          Data: ~/.local/share/GrokDesktop/
          EOF
          tar -C dist -czf "dist/${{ matrix.asset_name }}.tar.gz" "$(basename "$BUNDLE")"
          # Rename inner for clearer extract
          # Also ship bare binary
          cp "$BIN" "dist/${{ matrix.asset_name }}"
          chmod +x "dist/${{ matrix.asset_name }}"
          ls -la dist

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows asset
        uses: actions/download-artifact@v4
        with:
          name: release-Windows
          path: release-assets

      - name: Download Linux asset
        uses: actions/download-artifact@v4
        with:
          name: release-Linux
          path: release-assets

      - name: List release assets
        run: ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Grok Proxy Plus ${{ github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
