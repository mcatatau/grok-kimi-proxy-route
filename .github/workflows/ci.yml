name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
          - os: ubuntu-latest
            platform: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Ubuntu 24.04 ships webkit2gtk-4.1; Wails needs -tags webkit2_41
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            gcc \
            pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Go mod download
        run: go mod download

      - name: Build (Wails)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            wails build -platform ${{ matrix.platform }} -tags webkit2_41 -clean
          else
            wails build -platform ${{ matrix.platform }} -clean
          fi

      - name: List artifacts
        shell: bash
        run: |
          echo "=== build/bin ==="
          ls -la build/bin || true
          find build/bin -type f 2>/dev/null || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok-proxy-plus-${{ runner.os }}-${{ github.sha }}
          path: build/bin/*
          if-no-files-found: error
          retention-days: 14
